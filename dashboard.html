<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELLORA AI – Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white">

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-64 bg-black p-6">
  <h2 class="text-xl font-bold mb-10">SELLORA</h2>

  <nav class="space-y-4 text-gray-300">
    <button onclick="showSection('overview')" class="block w-full text-left hover:text-white">
      Overview
    </button>

    <button onclick="showSection('trending')" class="block w-full text-left hover:text-white">
      Trending
    </button>

    <button onclick="showSection('suppliers')" class="block w-full text-left hover:text-white">
      Suppliers
    </button>

    <button onclick="showSection('analytics')" class="block w-full text-left hover:text-white">
      Analytics
    </button>

    <button onclick="logout()" class="text-red-400 mt-20">
      Logout
    </button>
  </nav>
</aside>

<!-- MAIN -->
<main class="flex-1 p-10">

  <div class="flex justify-between mb-10">
    <h1 class="text-3xl font-bold">Dashboard</h1>
    <div>
      <span id="userEmail"></span>
      <span id="userPlan"
            class="ml-4 px-3 py-1 rounded-full text-sm bg-purple-600">
      </span>
    </div>
  </div>

  <!-- OVERVIEW -->
  <section id="overview">
    <h2 class="text-2xl mb-4">Overview</h2>
    <p>Welcome to your export intelligence command center.</p>
  </section>

  <!-- TRENDING -->
  <section id="trending" class="hidden">
    <h2 class="text-2xl mb-4">Trending Products</h2>
    <div id="premiumLock" class="hidden text-red-400">
      🔒 Upgrade to Pro or Elite to access premium data.
    </div>
    <div id="premiumContent" class="grid grid-cols-3 gap-6">
      <div class="bg-slate-800 p-6 rounded-xl">Product A</div>
      <div class="bg-slate-800 p-6 rounded-xl">Product B</div>
      <div class="bg-slate-800 p-6 rounded-xl">Product C</div>
    </div>
  </section>

</main>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJGPJmz2459zqdIRTQfrWNy83w2qYnK68",
  authDomain: "sellora-ai.firebaseapp.com",
  projectId: "sellora-ai",
  storageBucket: "sellora-ai.firebasestorage.app",
  messagingSenderId: "7850591690",
  appId: "1:7850591690:web:346fccc5531288fb2a3b33"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("userEmail").innerText = user.email;

  const docRef = doc(db, "users", user.uid);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {

    const data = docSnap.data();
    const plan = data.plan;
    const status = data.status;

    document.getElementById("userPlan").innerText =
      plan ? plan.toUpperCase() : "FREE";

    if (status !== "active" || plan === "free") {
      document.getElementById("premiumLock").classList.remove("hidden");
      document.getElementById("premiumContent").classList.add("hidden");
    }
  }

});

window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

window.showSection = function(section) {
  document.querySelectorAll("main section")
    .forEach(sec => sec.classList.add("hidden"));

  document.getElementById(section)
    .classList.remove("hidden");
};

</script>

</body>
</html>
