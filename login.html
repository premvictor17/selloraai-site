<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELLORA AI – Secure Access</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl grid md:grid-cols-2 overflow-hidden">

  <!-- LEFT BRAND PANEL -->
  <div class="bg-gradient-to-br from-indigo-600 to-purple-600 text-white p-12 hidden md:flex flex-col justify-center">

    <h1 class="text-4xl font-bold mb-6">SELLORA AI</h1>
    <p class="text-lg opacity-90 mb-8">
      The Export Intelligence Command Center for serious global traders.
    </p>

    <ul class="space-y-4 text-sm opacity-90">
      <li>✔ AI Demand Signals</li>
      <li>✔ Verified Suppliers</li>
      <li>✔ Global Export Analytics</li>
      <li>✔ Executive Dashboard</li>
    </ul>

  </div>

  <!-- RIGHT FORM PANEL -->
  <div class="p-10">

    <!-- TABS -->
    <div class="flex mb-8 border-b">
      <button onclick="switchTab('login')" id="loginTab"
        class="flex-1 py-3 font-semibold border-b-2 border-indigo-600">
        Login
      </button>

      <button onclick="switchTab('signup')" id="signupTab"
        class="flex-1 py-3 font-semibold text-gray-400">
        Create Account
      </button>
    </div>

    <!-- FORM -->
    <div class="space-y-4">

      <div>
        <label class="text-sm text-gray-600">Email</label>
        <input type="email" id="email"
          class="w-full mt-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <div>
        <label class="text-sm text-gray-600">Password</label>
        <input type="password" id="password"
          class="w-full mt-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- PLAN SELECTION (SIGNUP ONLY) -->
      <div id="planSelection" class="hidden">
        <label class="text-sm text-gray-600">Select Plan</label>

        <select id="plan"
          class="w-full mt-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
          <option value="pro">Pro – ₹2,999/month</option>
          <option value="elite">Elite – ₹4,999/month</option>
        </select>
      </div>

      <button id="mainButton"
        onclick="handleAuth()"
        class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition">
        Login
      </button>

    </div>

    <p id="message" class="text-center text-sm mt-4"></p>

  </div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJGPJmz2459zqdIRTQfrWNy83w2qYnK68",
  authDomain: "sellora-ai.firebaseapp.com",
  projectId: "sellora-ai",
  storageBucket: "sellora-ai.firebasestorage.app",
  messagingSenderId: "7850591690",
  appId: "1:7850591690:web:346fccc5531288fb2a3b33"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let mode = "login";

window.switchTab = function(tab) {

  mode = tab;

  document.getElementById("message").innerText = "";

  if(tab === "signup") {
    document.getElementById("planSelection").classList.remove("hidden");
    document.getElementById("mainButton").innerText = "Create Account & Continue";
    document.getElementById("signupTab").classList.add("border-indigo-600","border-b-2");
    document.getElementById("loginTab").classList.remove("border-indigo-600","border-b-2");
  } else {
    document.getElementById("planSelection").classList.add("hidden");
    document.getElementById("mainButton").innerText = "Login";
    document.getElementById("loginTab").classList.add("border-indigo-600","border-b-2");
    document.getElementById("signupTab").classList.remove("border-indigo-600","border-b-2");
  }
};

window.handleAuth = async function() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const message = document.getElementById("message");

  if(!email || !password) {
    message.innerText = "Please fill all fields";
    message.className = "text-red-500 text-center text-sm mt-4";
    return;
  }

  try {

    if(mode === "signup") {

      const plan = document.getElementById("plan").value;

      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        email: email,
        plan: plan,
        status: "inactive",
        createdAt: new Date()
      });

      window.location.href = "index.html#pricing";

    } else {

      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "dashboard.html";

    }

  } catch(error) {
    message.innerText = error.message;
    message.className = "text-red-500 text-center text-sm mt-4";
  }
};

</script>

</body>
</html>
