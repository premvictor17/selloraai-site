<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SELLORA Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/charts/loader.js"></script>

</head>

<body class="bg-slate-900 text-white">

<div class="flex">

<!-- SIDEBAR -->

<div class="w-64 h-screen bg-black p-6">

<h1 class="text-xl font-bold mb-10">SELLORA</h1>

<nav class="space-y-4 text-gray-300">

<button onclick="showSection('overview')" class="block hover:text-white">
Overview
</button>

<button onclick="showSection('trending')" class="block hover:text-white">
Trending Products
</button>

<button onclick="showSection('suppliers')" class="block hover:text-white">
Supplier Intelligence
</button>

<button onclick="showSection('heatmap')" class="block hover:text-white">
Global Demand Map
</button>

<button onclick="showSection('ai')" class="block hover:text-white">
AI Export Advisor
</button>

<button onclick="logout()" class="text-red-400 mt-10">
Logout
</button>

</nav>

</div>


<!-- MAIN -->

<div class="flex-1 p-10">

<div class="flex justify-end mb-10">

<span id="userEmail" class="mr-4 text-gray-300"></span>
<span id="userPlan" class="bg-purple-600 px-3 py-1 rounded-full text-sm"></span>

</div>


<!-- OVERVIEW -->

<div id="overview">

<h1 class="text-4xl font-bold mb-8">Dashboard Overview</h1>

<div class="grid grid-cols-4 gap-6">

<div class="bg-slate-800 p-6 rounded-xl">
<p class="text-gray-400">Active Products</p>
<p class="text-3xl font-bold">128</p>
</div>

<div class="bg-slate-800 p-6 rounded-xl">
<p class="text-gray-400">High Demand</p>
<p class="text-3xl font-bold">37</p>
</div>

<div class="bg-slate-800 p-6 rounded-xl">
<p class="text-gray-400">Suppliers</p>
<p class="text-3xl font-bold">542</p>
</div>

<div class="bg-slate-800 p-6 rounded-xl">
<p class="text-gray-400">Export Score</p>
<p class="text-3xl font-bold">89%</p>
</div>

</div>

</div>


<!-- TRENDING PRODUCTS -->

<div id="trending" class="hidden">

<h2 class="text-3xl font-bold mb-6">Trending Export Opportunities</h2>

<div class="bg-slate-800 rounded-xl p-6">

<table class="w-full text-left">

<thead class="border-b border-gray-700 text-gray-400">

<tr>
<th class="py-3">Product</th>
<th>Demand Score</th>
<th>Best Market</th>
<th>Margin</th>
<th>Suppliers</th>
</tr>

</thead>

<tbody id="productsTable"></tbody>

</table>

</div>

</div>


<!-- SUPPLIERS -->

<div id="suppliers" class="hidden">

<h2 class="text-3xl font-bold mb-6">Verified Suppliers</h2>

<div class="bg-slate-800 rounded-xl p-6">

<table class="w-full text-left">

<thead class="border-b border-gray-700 text-gray-400">

<tr>
<th>Supplier</th>
<th>Product</th>
<th>Location</th>
<th>MOQ</th>
<th>Contact</th>
</tr>

</thead>

<tbody id="suppliersTable"></tbody>

</table>

</div>

</div>


<!-- HEATMAP -->

<div id="heatmap" class="hidden">

<h2 class="text-3xl font-bold mb-6">Global Demand Heatmap</h2>

<div id="regions_div" style="width:100%; height:600px;"></div>

</div>


<!-- AI -->

<div id="ai" class="hidden">

<h2 class="text-3xl font-bold mb-6">AI Export Advisor</h2>

<input id="aiQuery"
placeholder="Example: export to UAE"
class="w-full p-4 rounded-lg text-black mb-4">

<button onclick="runAI()" class="bg-purple-600 px-6 py-3 rounded-lg">
Analyze Market
</button>

<div id="aiResults" class="mt-6"></div>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, limit }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDJGPJmz2459zqdIRTQfrWNy83w2qYnK68",
authDomain: "sellora-ai.firebaseapp.com",
projectId: "sellora-ai",
storageBucket: "sellora-ai.firebasestorage.app",
messagingSenderId: "7850591690",
appId: "1:7850591690:web:346fccc5531288fb2a3b33"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.showSection = function(section){

["overview","trending","suppliers","heatmap","ai"].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});

document.getElementById(section).classList.remove("hidden");

if(section==="trending") loadProducts();
if(section==="suppliers") loadSuppliers();
if(section==="heatmap") drawMap();

}


async function loadProducts(){

const q=query(collection(db,"products"),orderBy("demand_score","desc"),limit(20));
const snapshot=await getDocs(q);

const table=document.getElementById("productsTable");
table.innerHTML="";

snapshot.forEach(doc=>{
const d=doc.data();

table.innerHTML+=`
<tr class="border-b border-gray-700">
<td>${d.product}</td>
<td>${d.demand_score}</td>
<td>${d.best_market}</td>
<td>${d.margin}</td>
<td>${d.supplier_count}</td>
</tr>
`;

});

}


async function loadSuppliers(){

const snapshot=await getDocs(collection(db,"suppliers"));

const table=document.getElementById("suppliersTable");
table.innerHTML="";

snapshot.forEach(doc=>{
const s=doc.data();

table.innerHTML+=`
<tr class="border-b border-gray-700">
<td>${s.supplier_name}</td>
<td>${s.product}</td>
<td>${s.location}</td>
<td>${s.moq}</td>
<td>${s.contact}</td>
</tr>
`;

});

}


google.charts.load('current',{packages:['geochart']});

function drawMap(){

var data=google.visualization.arrayToDataTable([
['Country','Demand'],
['United Arab Emirates',92],
['United States',88],
['Germany',85],
['United Kingdom',83],
['Canada',78]
]);

var options={
colorAxis:{colors:['#93c5fd','#4f46e5']},
legend:{textStyle:{color:'#fff'}}
};

var chart=new google.visualization.GeoChart(document.getElementById('regions_div'));

chart.draw(data,options);

}


window.runAI = async function(){

const q=document.getElementById("aiQuery").value.toLowerCase();

const snapshot=await getDocs(collection(db,"products"));

let results=[];

snapshot.forEach(doc=>{
const d=doc.data();

if(q.includes(d.best_market.toLowerCase())){
results.push(d);
}

});

let output="";

results.forEach(r=>{
output+=`
<div class="mb-4 border-b border-gray-700 pb-2">
<strong>${r.product}</strong><br>
Demand Score: ${r.demand_score}<br>
Market: ${r.best_market}
</div>
`;
});

document.getElementById("aiResults").innerHTML=output;

}


window.logout=function(){

localStorage.clear();
window.location.href="login.html";

}

document.getElementById("userEmail").innerText=
localStorage.getItem("sellora_email") || "User";

document.getElementById("userPlan").innerText=
(localStorage.getItem("sellora_plan") || "FREE").toUpperCase();

</script>

</body>
</html>
